name: lagoon_padel
description: Lagoon Padel — réservation de terrains (Tahiti).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  provider: ^6.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo_lagoon_padel.png

flutter_launcher_icons:
  image_path: assets/logo_lagoon_padel.png
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  adaptive_icon_background: '#FFFFFF'
